<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen to Yourself - Page 14</title>
    <!-- Gruesa sans-serif, muy geométrica -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles14.css">
</head>

<body>
    <main class="music-promo-layout">

        <!-- Bloque Izquierdo: Textos y Estadísticas -->
        <section class="info-sidebar">

            <h1 class="bold-campaign-title">
                Listen to yourself<br>
                Follow your heart
            </h1>

            <p class="description-text">
                Lorem ipsum dolor sit amet, consectetur<br>
                adipiscing elit. Faucibus in libero risus semper<br>
                habitant arcu eget. Et integer facilisi eget.
            </p>

            <a href="#" class="yellow-action-btn">Download the App</a>

            <!-- Tarjeta inferior oscura de estadísticas -->
            <div class="stats-dark-board">

                <div class="stat-block">
                    <span class="stat-val">4.9</span>
                    <hr class="stat-line">
                    <p class="stat-lbl">
                        Lorem ipsum<br>dolor amet
                    </p>
                </div>

                <div class="stat-block">
                    <span class="stat-val">876K</span>
                    <hr class="stat-line">
                    <p class="stat-lbl">
                        Lorem ipsum<br>dolor amet
                    </p>
                </div>

                <div class="stat-block">
                    <span class="stat-val">No.1</span>
                    <hr class="stat-line">
                    <p class="stat-lbl">
                        Lorem ipsum<br>dolor amet
                    </p>
                </div>

            </div>

        </section>


        <!-- Bloque Derecho: Collage Inclinado -->
        <section class="tilted-collage-area">

            <!-- Tarjeta de fondo oscura (inclinada) -->
            <div class="bg-card dark-tilt-card"></div>

            <!-- Tarjeta principal amarilla (inclinada encima) -->
            <div class="bg-card yellow-tilt-card">

                <!-- Corazón negro gigante dentro de la tarjeta amarilla -->
                <!-- SVGs con clases unicas para evitar superposiciones de estilos -->
                <svg class="giant-heart-icon" viewBox="0 0 100 100" fill="#3B291A" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 90 A20 20 0 0 1 10 50 A20 20 0 0 1 50 20 A20 20 0 0 1 90 50 A20 20 0 0 1 50 90 Z"
                        transform="translate(0, -5) scale(1, 0.9)" />
                    <!-- Corrección a path simple de corazón SVG -->
                    <path d="M50 85 C50 85 10 60 10 30 C10 10 40 10 50 30 C60 10 90 10 90 30 C90 60 50 85 50 85 Z" />
                </svg>

            </div>

            <!-- Mockup simulado de celular -->
            <!-- Creamos la carcasa con CSS puro -->
            <div class="smartphone-mockup">
                <!-- Pantalla interior con la imagen del reproductor de música -->
                <div class="screen-content">
                    <img src= "/image/index14.png"
                        alt="Music App Interface Screenshot" class="app-screenshot">
                </div>
            </div>


            <!-- === DECORACIONES (Estrellas esparcidas) === -->

            <!-- Estrella 5 puntas marrón (Arriba izquierda) -->
            <svg class="abstract-star star-brown-top" viewBox="0 0 100 100" fill="#3E2C1E"
                xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,0 60,35 95,35 65,55 75,90 50,70 25,90 35,55 5,35 40,35" />
            </svg>

            <!-- Destello de 4 puntas blanco (Arriba derecha) -->
            <svg class="abstract-star star-white-right" viewBox="0 0 100 100" fill="#ffffff"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M50 0 Q50 50 100 50 Q50 50 50 100 Q50 50 0 50 Q50 50 50 0 Z" />
            </svg>

            <!-- Destello de 4 puntas gris (Medio derecha, sobre tarjeta negra) -->
            <svg class="abstract-star star-grey-mid" viewBox="0 0 100 100" fill="#A7A7A7"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M50 0 Q50 50 100 50 Q50 50 50 100 Q50 50 0 50 Q50 50 50 0 Z" />
            </svg>

            <!-- Estrella amarilla geométrica (Abajo derecha) -->
            <svg class="abstract-star star-yellow-bottom" viewBox="0 0 100 100" fill="#FDE08B"
                xmlns="http://www.w3.org/2000/svg">
                <!-- Construcción de estrella puntiaguda asimétrica -->
                <path
                    d="M50 5 L55 35 L85 20 L65 45 L95 60 L60 60 L75 90 L45 70 L20 95 L35 60 L5 65 L40 45 L15 20 L45 35 Z" />
            </svg>

        </section>

    </main>
</body>

</html>
