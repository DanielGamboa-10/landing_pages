<!DOCTYPE html>

<head>

                <svg class="circling-text-svg" viewBox="0 0 150 150">
                    <path id="circlePath1" d="M 75, 75 m -50, 0 a 50,50 0 1,1 100,0 a 50,50 0 1,1 -100,0" fill="none" />
                    <text>
                        <textPath href="#circlePath1">consectetur adipiscing elit.</textPath>
                    </text>

                <div class="text-manifesto-blk align-rt">
                    <p class="italic-entry">Exclusive gifts.</p>

                <div class="pic-frame sq-med">
