<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover the World - Layout 2</title>
    <link rel="stylesheet" href="/css/styles2.css">
</head>

<body>
    <div class="page-wrapper">

        <header class="top-showcase">
            <div class="text-block">
                <h1 class="primary-heading">Discover the<br>beauty around<br>the world</h1>
                <p class="sub-paragraph">
                    Lorem ipsum dolor sit amet,<br>
                    consectetur adipiscing elit.<br>
                    Faucibus in libero risus semper<br>
                    habitant arcu.
                </p>
                <a href="#" class="showcase-action">Get started</a>
            </div>

            <div class="media-collage">
                <img src="/image/Index2.1.png" alt="Nature 1" class="media-main">
                <img src="/image/index2.2.png" alt="Nature 2" class="media-secondary">
            </div>
        </header>

        <section class="numbered-grid">
            <article class="grid-column">
                <span class="column-number">01</span>
                <img src="/image/index.2.3.png" alt="View 1" class="column-graphic">
            </article>

            <article class="grid-column">
                <span class="column-number">02</span>
                <img src="/image/index.2.4.png" alt="View 2" class="column-graphic">
            </article>

            <article class="grid-column">
                <span class="column-number">03</span>
                <img src="/image/index.2.5.png" alt="View 3" class="column-graphic">
            </article>
        </section>
    </div>
</body>

</html>
