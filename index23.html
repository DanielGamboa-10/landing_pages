<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Eating - Page 19</title>
    <!-- Use Nunito for titles and sans-serif content -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles19.css">
</head>

<body>
    <div class="dietary-showcase-view">

        <section class="upper-light-sector">
            <div class="split-inner-wrapper">

                <!-- Text and button on left -->
                <article class="hero-left-desc">
                    <h1 class="main-display-hd">A place you<br>eat healthy</h1>

                    <p class="flavor-txt">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus<br>
                        semper habitant arcu eget. Et integer<br>
                        facilisi eget. Lorem ipsum dolor.
                    </p>

                    <a href="#" class="btn-slate-capsule">Explore the menu</a>
                </article>

                <!-- Bowl Image exactly over the right side overlapping the white -->
                <div class="floating-bowl-plate">
                    <img src="image/index19big.png"
                        alt="Healthy Bowl" class="dish-circular-img">
                </div>

            </div>
        </section>

        <section class="lower-white-sector">
            <div class="split-inner-wrapper align-lower">

                <!-- 3 Floating Pill Ingredients -->
                <div class="ingredients-capsule-row">
                    <div class="ing-capsule cap-yellow">
                        <img src="image/index19.1.png"
                            alt="Avocado" class="ing-img">
                    </div>
                    <div class="ing-capsule cap-green">
                        <img src="/image/index19.2.png"
                            alt="Green Veggies" class="ing-img">
                    </div>
                    <div class="ing-capsule cap-pink">
                        <img src="/image/index19.3.png"
                            alt="Root Veggies" class="ing-img">
                    </div>
                </div>

                <!-- Chef section right aligned under bowl -->
                <article class="chef-signature-blk">
                    <div class="blk-indicator-line"></div>
                    <h3 class="chef-title">Chef ABC</h3>
                    <p class="chef-bio-snip">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus semper
                    </p>

                    <!-- 4 tiny circle images -->
                    <div class="micro-ingredient-row">
                        <div class="micro-circle"><img
                                src="/image/tomate.png"
                                alt="Tomato"></div>
                        <div class="micro-circle"><img
                                src="/image/brocoli.png"
                                alt="Broccoli"></div>
                        <div class="micro-circle"><img
                                src="https://images.unsplash.com/photo-1615484477778-ca3b77940c25?q=80&w=150&auto=format&fit=crop"
                                alt="Pear"></div>
                        <div class="micro-circle"><img
                                src="/image/avena.png"
                                alt="Nuts"></div>
                    </div>
                </article>

            </div>
        </section>

    </div>
</body>

</html>
