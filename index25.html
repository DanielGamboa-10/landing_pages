<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boba Vibe</title>
    <link rel="stylesheet" href="/css/styles25.css">
</head>
<body>
    <div class="bv-main-container">
        
        <header class="bv-hero-wrapper">
            <div class="bv-text-column">
                <div class="bv-cup-icon">
                    <svg viewBox="0 0 100 100" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 30 L80 30" stroke-width="6"/>
                        <path d="M25 30 L35 90 C36 95 40 98 45 98 L55 98 C60 98 64 95 65 90 L75 30"/>
                        <path d="M40 5 L50 30" stroke-width="6"/>
                        <path d="M25 27 C30 15 70 15 75 27" stroke-width="4"/>
                        <circle cx="40" cy="70" r="4.5" fill="#ffffff" stroke="none" />
                        <circle cx="55" cy="80" r="4.5" fill="#ffffff" stroke="none" />
                        <circle cx="62" cy="62" r="4.5" fill="#ffffff" stroke="none" />
                        <circle cx="45" cy="85" r="4.5" fill="#ffffff" stroke="none" />
                        <circle cx="50" cy="60" r="4.5" fill="#ffffff" stroke="none" />
                        <circle cx="35" cy="80" r="4.5" fill="#ffffff" stroke="none" />
                    </svg>
                </div>
                
                <h1 class="bv-title-text">Boba vibe</h1>
                
                <p class="bv-subtitle-text">
                    Lorem ipsum dolor sit amet, consectetur<br>
                    adipiscing elit. Faucibus in libero risus semper

                <button class="bv-primary-btn">Browse menu</button>
            </div>
            
            <div class="bv-image-column">
                <div class="bv-circle-bg"></div>
                
                <div class="bv-blob-bg">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                      <path fill="#d7b089" d="M44.7,-76.4C58.9,-69.2,72.1,-59.1,81.1,-46.2C90.1,-33.3,95,-16.6,92.5,-1.4C89.9,13.8,80,27.6,71.2,40.8C62.4,54,54.7,66.6,43.2,74.7C31.7,82.8,15.8,86.5,0.7,85.3C-14.4,84.1,-28.8,78.1,-41.8,70.3C-54.8,62.5,-66.4,52.9,-75.6,40.8C-84.8,28.7,-91.6,14.4,-92.4,-0.4C-93.2,-15.2,-88.1,-30.3,-79.1,-42.6C-70.1,-54.9,-57.2,-64.3,-43.3,-71.8C-29.4,-79.4,-14.7,-85.1,0.6,-86.1C15.9,-87.1,30.5,-83.5,44.7,-76.4Z" transform="translate(100 100)" />
                    </svg>
                </div>
                
                <img src="/image/index25.coffee.png" alt="Iced Boba Coffee" class="bv-hero-image">
                
                <div class="bv-leaf-art">
                    <svg viewBox="0 0 100 100" fill="none" stroke="#ffece0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Main Central Leaf -->
                        <path d="M50 80 C50 40 80 20 80 20 C80 60 50 80 50 80 Z" />
                        <path d="M50 80 C60 80 70 50 80 20" />
                        
                        <!-- Left Leaf -->
                        <path d="M50 80 C30 75 20 60 20 60 C40 50 50 80 50 80 Z" />
                        
                        <!-- Right Leaf -->
                        <path d="M50 80 C60 90 80 85 80 85 C85 65 50 80 50 80 Z" />

                        <!-- Sparkles -->
                        <path d="M20 30 L26 30 M23 27 L23 33" stroke-width="1.5" />
                        <path d="M85 60 L91 60 M88 57 L88 63" stroke-width="1.5" />
                        <path d="M25 85 L31 85 M28 82 L28 88" stroke-width="1.5" />
                        <path d="M80 35 C80 35 81 36 81 35" stroke-width="3" />
                        <path d="M35 45 C35 45 36 46 36 45" stroke-width="3" />
                    </svg>
                </div>
            </div>
        </header>
        
        <section class="bv-cards-row">
            <article class="bv-card-item">
                <img src="/image/index25.2.png" alt="Coffee" class="bv-card-thumbnail">
                <div class="bv-card-details">
                    <span class="bv-card-value">56</span>
                    <p class="bv-card-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
            </article>
            
            <article class="bv-card-item">
                <img src="/image/index25.3.png" alt="Pouring latte" class="bv-card-thumbnail">
                <div class="bv-card-details">
                    <span class="bv-card-value">88</span>
                    <p class="bv-card-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
            </article>
            
            <article class="bv-card-item">
                <img src="/image/index25.4.png" alt="Iced drink" class="bv-card-thumbnail">
                <div class="bv-card-details">
                    <span class="bv-card-value">23</span>
                    <p class="bv-card-text">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
            </article>

</html>
