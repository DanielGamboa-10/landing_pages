<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juicy Bite</title>
    <link rel="stylesheet" href="css/styles26.css">
</head>
<body>
    <main class="jb-landing-wrapper">
        <div class="jb-glow-effect"></div>
        
        <div class="jb-content-container">
            <div class="jb-text-section">
                <h1 class="jb-main-headline">
                    Wake up your<br>
                    taste buds with<br>
                    this <span class="jb-highlight-red">juicy bite</span>
                </h1>
                
                <div class="jb-mini-gallery">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=150" alt="Burger 1" class="jb-gallery-thumb">
                    <img src="https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&q=80&w=150" alt="Burger 2" class="jb-gallery-thumb">
                    <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&q=80&w=150" alt="Burger 3" class="jb-gallery-thumb">
                    <img src="/image/miniburger.png" alt="Burger 4" class="jb-gallery-thumb">
                    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=150" alt="Burger 5" class="jb-gallery-thumb">
                    <img src="/image/jujuburger.png" alt="Burger 6" class="jb-gallery-thumb">
                </div>
                
                <p class="jb-description-text">
                    Lorem ipsum dolor sit amet, consectetur<br>
                    adipiscing elit. Faucibus in libero risus.
                </p>
                
                <button class="jb-cta-button">Explore the menu</button>
            </div>
            
            <div class="jb-image-section">
                <!-- Using a high-quality burger image as a placeholder for the floating one -->
                <img src="/image/superburger.png" alt="Delicious Burger" class="jb-hero-burger">
            </div>
        </div>
        
        <div class="jb-features-footer">
            <div class="jb-feature-badge jb-badge-left">
                <span>From farm to table</span>
            </div>
            <div class="jb-feature-badge jb-badge-center">
                <span>100% grass-feed beef</span>
            </div>
            <div class="jb-feature-badge jb-badge-right">
                <span>100% organic & natural</span>
            </div>
        </div>
    </main>
</body>
</html>
