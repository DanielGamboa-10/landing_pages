<!DOCTYPE html>
<html lang="en">
<head>

    <title>Yoga Club</title>
    <link rel="stylesheet" href="/css/styles27.css">
</head>
<body>
    <main class="yc-main-view">
        <div class="yc-content-wrapper">
            
            <section class="yc-glass-panel">
                <div class="yc-top-label">
                    <span class="yc-diamond-icon">✦</span> Yoga club
                </div>
                
                <h1 class="yc-heading-title">
                    Improve your<br>
                    mind-muscle
                </h1>
                
                <p class="yc-body-text">
                    Lorem ipsum dolor sit amet, consectetur<br>
                    adipiscing elit. Cursus imperdiet sed id<br>
                    elementum. Quam vel aliquam sit<br>
                    vulputate. Faucibus nec gravida ipsum<br>
                    pulvinar vel non.
                </p>
                
                <button class="yc-register-btn">Register a class</button>
            </section>
            
            <aside class="yc-side-gallery">
                <img src="/image/yoga1.png" alt="Yoga pose backbend" class="yc-gallery-pic">
                <img src="/image/yoga2.png" alt="Yoga pose balance" class="yc-gallery-pic">
                <img src="/image/yoga4.png" alt="Yoga pose stretch" class="yc-gallery-pic">

        </div>
