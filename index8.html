<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Design - Page 8 Fix</title>
    <!-- Importamos una fuente gruesa (Outfit) para el título y la misma Sans-serif para el texto -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles8.css">
</head>

<body>
    <main class="hero-solid-container">

        <!-- Lado Izquierdo: Solo la Foto -->
        <section class="strict-visual-box">
            <!-- Imagen en blanco y negro, simulando el retrato de la referencia -->
            <!-- Usamos un retrato de Unsplash para que quede más acorde a la nueva foto -->
            <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=800&q=80"
                alt="Dark Portrait" class="base-portrait">
        </section>

        <!-- Lado Derecho: Contenido Textual alineado a su propio bloque -->
        <section class="align-content-box">
            <h1 class="strong-impact-title">
                Take your<br>
                designs to<br>
                the next<br>
                level
            </h1>

            <p class="description-text-light">
                Lorem ipsum dolor sit amet, consectetur<br>
                adipiscing elit. Faucibus in libero risus<br>
                semper habitant arcu.
            </p>

            <a href="#" class="round-yellow-btn">Explore</a>
        </section>

    </main>
</body>

</html>
